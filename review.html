(function() {
  var lang = localStorage.getItem('signa_lang');

    else if (navLang.indexOf('id') === 0 || navLang.indexOf('in') === 0) lang = 'id';
    else lang = 'en';
    localStorage.setItem('signa_lang', lang);
  }
  document.documentElement.lang = lang;
  document.addEventListener('DOMContentLoaded', function() {
    var links = document.querySelectorAll('a[href*="signa.dishi.rest"]');
    for (var i = 0; i < links.length; i++) {
      links[i].href = links[i].href.replace(/\/en\//, '/' + lang + '/');
    }
  });
})();
</script>

							<script>
								const canvas = document.getElementById('myCanvas');
								const ctx = canvas.getContext('2d');
								let angle = 0; // начальный угол вращения

								function drawRotatingShape() {
									ctx.clearRect(0, 0, canvas.width, canvas.height); // Очистка Canvas перед перерисовкой

									ctx.save(); // Сохранение текущего состояния Canvas
									ctx.translate(50, 50); // Перемещение центра координат в центр Canvas
									ctx.rotate(angle); // Поворот фигуры

									// Рисуем звезду с вогнутыми арками
									ctx.beginPath();
									ctx.moveTo(0, -40);  // Верхняя точка

									// Правая вогнутая арка
									ctx.quadraticCurveTo(10, -10, 40, 0); 

									// Нижняя правая вогнутая арка
									ctx.quadraticCurveTo(10, 10, 0, 40); 

									// Нижняя левая вогнутая арка
									ctx.quadraticCurveTo(-10, 10, -40, 0);  

									// Левая вогнутая арка
									ctx.quadraticCurveTo(-10, -10, 0, -40);  

									ctx.closePath();
									ctx.fillStyle = 'rgb(235, 51, 0)';  // Красный цвет
									ctx.fill();

									ctx.restore(); // Восстановление состояния Canvas

									angle += 0.02; // Увеличение угла вращения
									requestAnimationFrame(drawRotatingShape); // Запуск следующего кадра
								}

								drawRotatingShape(); // Старт анимации
							</script>
