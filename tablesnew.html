<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Signa — Table Map</title>

  <link rel="manifest" href='data:application/manifest+json,{"name":"Table Selector","short_name":"Tables","start_url":"./tablesnew.html","display":"standalone","background_color":"#f4f4f4","theme_color":"#333333","icons":[{"src":"icon-192.png","sizes":"192x192","type":"image/png"},{"src":"icon-512.png","sizes":"512x512","type":"image/png"}]}'>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tables">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#333333">
  <base target="_self">

  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100vh; height: 100dvh;
      background: #f4f4f4;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    .wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 24px;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      box-sizing: border-box;
    }
    .text { color: #555; font-size: 1.05em; text-align: center; }
    .countdown {
      font-size: 4em; font-weight: 600; color: #333;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .btn {
      display: inline-block;
      padding: 18px 48px;
      background: #333; color: #fff;
      border: 0; border-radius: 12px;
      font-size: 1.15em; font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); background: #222; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="text">Opening table map in</div>
    <div class="countdown" id="cd">3</div>
    <a id="link" class="btn" href="https://www.dishi.rest/m/signa/table-map" target="_self" rel="noopener">Open now</a>
  </div>
  <script>
    var n = 3;
    var el = document.getElementById("cd");
    var link = document.getElementById("link");
    var t = setInterval(function() {
      n--;
      el.textContent = n;
      if (n <= 0) {
        clearInterval(t);
        link.click();
      }
    }, 1000);
  </script>
</body>
</html>
