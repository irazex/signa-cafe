<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<script>
(function() {
  var lang = localStorage.getItem('signa_lang');
  if (!lang) {
    var navLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    if (navLang.indexOf('ru') === 0) lang = 'ru';
    else if (navLang.indexOf('id') === 0 || navLang.indexOf('in') === 0) lang = 'id';
    else lang = 'en';
    localStorage.setItem('signa_lang', lang);
  }
  document.documentElement.lang = lang;
  document.addEventListener('DOMContentLoaded', function() {
    var links = document.querySelectorAll('a[href*="signa.dishi.rest"]');
    for (var i = 0; i < links.length; i++) {
      links[i].href = links[i].href.replace(/\/en\//, '/' + lang + '/');
    }
  });
})();
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Table</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="Table Selector">

  <style>
    body {
      font-family: sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      touch-action: manipulation;
    }
    h2 {
      background-color: #333;
      color: white;
      margin: 0;
      padding: 20px;
      font-size: 2em;
      text-align: center;
    }
    .section {
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }
    .table-btn {
      padding: 40px 10px;
      background-color: #fff;
      border: 3px solid #ccc;
      border-radius: 16px;
      text-align: center;
      font-size: 2em;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      user-select: none;
    }
    .table-btn:hover {
      background-color: #e0f7fa;
    }
    .table-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
